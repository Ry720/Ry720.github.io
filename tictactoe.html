<!DOCTYPE html>
<html>
<body style="background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0;">

<h2 id="status" style="color:white; font-family:Arial; margin-bottom:16px;">Player 1's turn (X)</h2>
<canvas id="game" width="600" height="600" style="background:black"></canvas>
<button onclick="resetGame()" style="margin-top:16px; padding:10px 30px; font-size:16px; cursor:pointer; border-radius:8px; border:none; background:#444; color:white;">Restart</button>

<script>
    const canvas = document.getElementById('game')
    const ctx = canvas.getContext('2d')

    let turn = 'player1'
    let grid = [
        [0, 0, 0],
        [0, 0, 0],
        [0, 0, 0]
    ]
    let gameOver = false

    canvas.addEventListener('click', e => {
        if (gameOver) return

        let col = Math.floor(e.offsetX / 200)
        let row = Math.floor(e.offsetY / 200)

        if (grid[row][col] != 0) return  // square already taken

        grid[row][col] = turn

        if (checkWin()) {
            draw()
            let winner = turn == 'player1' ? 'Player 1 (X)' : 'Player 2 (O)'
            document.getElementById('status').textContent = winner + ' wins!'
            gameOver = true
            return
        }

        if (checkDraw()) {
            draw()
            document.getElementById('status').textContent = "It's a draw!"
            gameOver = true
            return
        }

        turn = turn == 'player1' ? 'player2' : 'player1'
        document.getElementById('status').textContent = turn == 'player1' ? "Player 1's turn (X)" : "Player 2's turn (O)"
        draw()
    })

    function checkWin() {
        // check rows
        for (let r = 0; r < 3; r++) {
            if (grid[r][0] != 0 && grid[r][0] == grid[r][1] && grid[r][1] == grid[r][2]) return true
        }
        // check cols
        for (let c = 0; c < 3; c++) {
            if (grid[0][c] != 0 && grid[0][c] == grid[1][c] && grid[1][c] == grid[2][c]) return true
        }
        // check diagonals
        if (grid[0][0] != 0 && grid[0][0] == grid[1][1] && grid[1][1] == grid[2][2]) return true
        if (grid[0][2] != 0 && grid[0][2] == grid[1][1] && grid[1][1] == grid[2][0]) return true
        return false
    }

    function checkDraw() {
        for (let r = 0; r < 3; r++)
            for (let c = 0; c < 3; c++)
                if (grid[r][c] == 0) return false
        return true
    }

    function drawGrid() {
        ctx.strokeStyle = 'white'
        ctx.lineWidth = 3
        for (let i = 1; i < 3; i++) {
            // vertical lines
            ctx.beginPath()
            ctx.moveTo(i * 200, 0)
            ctx.lineTo(i * 200, 600)
            ctx.stroke()
            // horizontal lines
            ctx.beginPath()
            ctx.moveTo(0, i * 200)
            ctx.lineTo(600, i * 200)
            ctx.stroke()
        }
    }

    function drawX(col, row) {
        let x = col * 200 + 100
        let y = row * 200 + 100
        ctx.strokeStyle = '#ff6b6b'
        ctx.lineWidth = 8
        ctx.beginPath()
        ctx.moveTo(x - 70, y - 70)
        ctx.lineTo(x + 70, y + 70)
        ctx.stroke()
        ctx.beginPath()
        ctx.moveTo(x + 70, y - 70)
        ctx.lineTo(x - 70, y + 70)
        ctx.stroke()
    }

    function drawO(col, row) {
        let x = col * 200 + 100
        let y = row * 200 + 100
        ctx.strokeStyle = '#6bc5ff'
        ctx.lineWidth = 8
        ctx.beginPath()
        ctx.arc(x, y, 70, 0, Math.PI * 2)
        ctx.stroke()
    }

    function draw() {
        ctx.clearRect(0, 0, 600, 600)
        drawGrid()
        for (let row = 0; row < 3; row++) {
            for (let col = 0; col < 3; col++) {
                if (grid[row][col] == 'player1') drawX(col, row)
                if (grid[row][col] == 'player2') drawO(col, row)
            }
        }
    }

    function resetGame() {
        grid = [[0,0,0],[0,0,0],[0,0,0]]
        turn = 'player1'
        gameOver = false
        document.getElementById('status').textContent = "Player 1's turn (X)"
        draw()
    }

    draw()
</script>

</body>
</html>
