<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HomeworkAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --surface2: #1f1f24;
    --border: #2a2a30;
    --accent: #c8f060;
    --accent2: #60f0c8;
    --text: #f0ede8;
    --muted: #7a7a88;
    --danger: #ff6b6b;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
    padding: 2.5rem 2rem;
    gap: 2rem;
  }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; padding: 1.5rem 1rem; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  #video-container {
    position: relative;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 4/3;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas { display: none; }

  #preview-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    display: none;
  }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .placeholder-icon {
    font-size: 2.5rem;
    opacity: 0.4;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 400;
    padding: 0.65rem 1.2rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #0d0d0f;
    font-weight: 600;
  }

  .btn-primary:hover { background: #d9f570; }
  .btn-primary:disabled { background: #3a3a3a; color: var(--muted); cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--muted); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid #3a2020;
    font-size: 0.8rem;
    padding: 0.4rem 0.8rem;
  }

  .btn-danger:hover { background: #2a1515; }

  .btn-row {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .btn-row .btn { flex: 1; min-width: 100px; }

  #answer-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    font-size: 0.92rem;
    line-height: 1.75;
    color: var(--text);
    min-height: 200px;
    flex: 1;
    white-space: pre-wrap;
    overflow-y: auto;
  }

  #answer-box.empty {
    color: var(--muted);
    font-style: italic;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 0.85rem;
  }

  .loading-dots {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
    min-height: 200px;
  }

  .loading-dots span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    font-weight: 300;
  }

  .api-setup {
    background: var(--surface2);
    border: 1px solid #2a2030;
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }

  .api-setup label {
    font-size: 0.78rem;
    color: var(--muted);
    display: block;
    margin-bottom: 0.4rem;
    letter-spacing: 0.5px;
  }

  .api-setup input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .api-setup input:focus { border-color: var(--accent); }

  .subject-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }

  .pill:hover, .pill.active {
    background: var(--accent);
    color: #0d0d0f;
    border-color: var(--accent);
    font-weight: 600;
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  #status-msg {
    font-size: 0.8rem;
    color: var(--accent2);
    min-height: 1.2em;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Homework<span>AI</span></div>
  <div class="badge">Powered by Claude</div>
</header>

<main>
  <!-- LEFT: Camera Panel -->
  <div class="panel">
    <div class="panel-title">📷 Capture Question</div>

    <div id="video-container">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">📸</div>
        <div>Click "Start Camera" to begin</div>
      </div>
      <video id="video" autoplay playsinline></video>
      <img id="preview-img" alt="Captured question"/>
    </div>

    <canvas id="canvas"></canvas>

    <div class="btn-row">
      <button class="btn btn-secondary" id="start-btn" onclick="startCamera()">▶ Start Camera</button>
      <button class="btn btn-primary" id="capture-btn" onclick="capture()" disabled>📷 Capture</button>
    </div>

    <div id="status-msg"></div>

    <div class="divider"></div>

    <div>
      <div class="panel-title" style="margin-bottom: 0.6rem;">Subject</div>
      <div class="subject-pills">
        <div class="pill active" onclick="setSubject(this, 'any subject')">Any</div>
        <div class="pill" onclick="setSubject(this, 'Math')">Math</div>
        <div class="pill" onclick="setSubject(this, 'Science')">Science</div>
        <div class="pill" onclick="setSubject(this, 'History')">History</div>
        <div class="pill" onclick="setSubject(this, 'English')">English</div>
        <div class="pill" onclick="setSubject(this, 'Chemistry')">Chemistry</div>
        <div class="pill" onclick="setSubject(this, 'Biology')">Biology</div>
        <div class="pill" onclick="setSubject(this, 'Physics')">Physics</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="api-setup">
      <label>ANTHROPIC API KEY</label>
      <input type="password" id="api-key" placeholder="sk-ant-..." />
    </div>

    <p class="hint">Get a free API key at <a href="https://console.anthropic.com" style="color:var(--accent2)">console.anthropic.com</a></p>
  </div>

  <!-- RIGHT: Answer Panel -->
  <div class="panel">
    <div class="panel-title">🧠 Answer</div>

    <div id="answer-box" class="empty">
      Capture a homework question and I'll solve it step by step ✨
    </div>

    <button class="btn btn-primary" id="solve-btn" onclick="solve()" disabled>
      ✨ Solve This Question
    </button>

    <button class="btn btn-danger" id="clear-btn" onclick="clearAll()" style="display:none">
      ✕ Clear & Start Over
    </button>
  </div>
</main>

<script>
let stream = null;
let capturedImage = null;
let subject = 'any subject';

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const preview = document.getElementById('preview-img');
const placeholder = document.getElementById('placeholder');
const answerBox = document.getElementById('answer-box');
const solveBtn = document.getElementById('solve-btn');
const captureBtn = document.getElementById('capture-btn');
const clearBtn = document.getElementById('clear-btn');
const statusMsg = document.getElementById('status-msg');

function setSubject(el, val) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  subject = val;
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    video.srcObject = stream;
    video.style.display = 'block';
    placeholder.style.display = 'none';
    captureBtn.disabled = false;
    document.getElementById('start-btn').textContent = '🟢 Camera On';
    statusMsg.textContent = 'Camera ready — point at your question!';
  } catch(e) {
    statusMsg.style.color = 'var(--danger)';
    statusMsg.textContent = 'Camera access denied. Please allow camera permission.';
  }
}

function capture() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  capturedImage = canvas.toDataURL('image/jpeg', 0.9);

  preview.src = capturedImage;
  preview.style.display = 'block';
  video.style.display = 'none';

  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('start-btn').textContent = '🔄 Retake';
  captureBtn.disabled = true;
  solveBtn.disabled = false;
  clearBtn.style.display = 'flex';
  statusMsg.style.color = 'var(--accent2)';
  statusMsg.textContent = 'Question captured! Hit "Solve" to get your answer.';
}

async function solve() {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) {
    statusMsg.style.color = 'var(--danger)';
    statusMsg.textContent = 'Please enter your Anthropic API key first.';
    return;
  }
  if (!capturedImage) {
    statusMsg.style.color = 'var(--danger)';
    statusMsg.textContent = 'Please capture a question first.';
    return;
  }

  solveBtn.disabled = true;
  answerBox.className = '';
  answerBox.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  statusMsg.style.color = 'var(--accent2)';
  statusMsg.textContent = 'Analyzing your question...';

  try {
    const base64 = capturedImage.split(',')[1];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
            { type: 'text', text: `You are a helpful homework tutor. The student needs help with a ${subject} question shown in this image. Please:\n1. Identify the question\n2. Explain the concept briefly\n3. Solve it step by step\n4. Give the final answer clearly\n\nBe encouraging and easy to understand!` }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const answer = data.content.map(b => b.text || '').join('');
    answerBox.className = '';
    answerBox.textContent = answer;
    statusMsg.textContent = '✓ Done! Read your answer on the right.';
  } catch(err) {
    answerBox.className = 'empty';
    answerBox.textContent = 'Error: ' + err.message;
    statusMsg.style.color = 'var(--danger)';
    statusMsg.textContent = 'Something went wrong. Check your API key.';
  }

  solveBtn.disabled = false;
}

function clearAll() {
  capturedImage = null;
  preview.style.display = 'none';
  preview.src = '';
  placeholder.style.display = 'flex';
  answerBox.className = 'empty';
  answerBox.textContent = 'Capture a homework question and I\'ll solve it step by step ✨';
  solveBtn.disabled = true;
  captureBtn.disabled = true;
  clearBtn.style.display = 'none';
  document.getElementById('start-btn').textContent = '▶ Start Camera';
  statusMsg.textContent = '';
}
</script>
</body>
</html>
